name: Supabase Migrations

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Supabase CLI
        run: npm install -g supabase
      
      - name: Debug Connection String
        run: |
          echo "Project Ref: ${{ secrets.SUPABASE_PROJECT_REF }}"
          echo "DB User: postgres"
          echo "Host: db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co"
          echo "Port: 6543 (Pooler)"
      
      - name: Run Migrations
        run: |
          supabase db push \
            --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co:6543/postgres?sslmode=require" \
            --dry-run false
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Verify Migration
        run: |
          supabase db list-remotes \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --access-token ${{ secrets.SUPABASE_ACCESS_TOKEN }}